<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-7xl mx-auto px-4">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-4">Vacantes Disponibles</h1>
      
      <!-- Search Bar -->
      <div class="flex gap-2">
        <div class="flex-1">
          <input 
            type="text" 
            [(ngModel)]="searchTerm"
            (keyup.enter)="search()"
            placeholder="Buscar por título, empresa o tecnología..."
            class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        <button 
          (click)="search()"
          class="px-6 py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
          Buscar
        </button>
      </div>
    </div>

    <!-- Loader -->
    @if (loading) {
      <app-loader></app-loader>
    }

    <!-- Jobs Grid -->
    @if (!loading && jobs.length > 0) {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (job of jobs; track job.slug) {
          <app-job-card [job]="job"></app-job-card>
        }
      </div>
    }

    <!-- Empty State -->
    @if (!loading && jobs.length === 0) {
      <app-empty-state 
        message="No se encontraron vacantes"
        icon="💼">
      </app-empty-state>
    }

    <!-- Pagination -->
    @if (!loading && jobs.length > 0) {
      <div class="mt-8 flex justify-center items-center space-x-4">
        <button 
          (click)="previousPage()"
          [disabled]="currentPage === 1"
          class="px-4 py-2 border border-gray-300 rounded-md disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
          ← Anterior
        </button>
        
        <span class="text-gray-600">
          Página {{ currentPage }} de {{ totalPages }}
        </span>
        
        <button 
          (click)="nextPage()"
          [disabled]="currentPage === totalPages"
          class="px-4 py-2 border border-gray-300 rounded-md disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50">
          Siguiente →
        </button>
      </div>
    }
  </div>
</div>
