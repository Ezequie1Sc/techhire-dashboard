<header class="fixed top-4 left-0 right-0 z-50 px-4">
  <nav class="max-w-7xl mx-auto">
    <div class="bg-[#fbfaf7]/90 backdrop-blur-xl border border-black/5 shadow-[0_18px_50px_rgba(0,0,0,0.08)] rounded-full px-4 md:px-5 py-3">

      <div class="flex items-center justify-between gap-4">

        <!-- Logo -->
        <a
          routerLink="/"
          class="flex items-center gap-3 group"
          (click)="isMenuOpen = false"
        >
          <div class="w-10 h-10 rounded-full bg-[#141414] text-white flex items-center justify-center font-semibold tracking-[-0.04em]">
            T
          </div>

          <div class="leading-tight">
            <p class="font-semibold text-[#141414] tracking-[-0.03em]">
              TechHire
            </p>
            <p class="hidden sm:block text-[11px] text-[#8a8177] uppercase tracking-[0.18em]">
              Jobs Platform
            </p>
          </div>
        </a>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-2 bg-white/70 border border-black/5 rounded-full p-1">
          <a
            routerLink="/"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
          >
            Inicio
          </a>

          <a
            routerLink="/jobs"
            routerLinkActive="nav-active"
            class="nav-link"
          >
            Vacantes
          </a>

          <a
            routerLink="/favorites"
            routerLinkActive="nav-active"
            class="nav-link"
          >
            Favoritos
          </a>
        </div>

        <!-- Desktop CTA -->
        <a
          routerLink="/jobs"
          class="hidden md:inline-flex items-center gap-2 bg-[#141414] text-white px-5 py-3 rounded-full text-sm font-medium hover:scale-[1.02] transition"
        >
          Explorar
          <span>→</span>
        </a>

        <!-- Mobile Button -->
        <button
          type="button"
          (click)="toggleMenu()"
          class="md:hidden w-11 h-11 rounded-full bg-[#141414] text-white flex items-center justify-center transition hover:scale-105"
          aria-label="Abrir menú"
        >
          @if (!isMenuOpen) {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          }
        </button>

      </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMenuOpen) {
      <div class="md:hidden mt-3 bg-[#fbfaf7]/95 backdrop-blur-xl border border-black/5 shadow-[0_18px_50px_rgba(0,0,0,0.08)] rounded-[2rem] p-3">

        <a
          routerLink="/"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="mobile-active"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          Inicio
        </a>

        <a
          routerLink="/jobs"
          routerLinkActive="mobile-active"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          Vacantes
        </a>

        <a
          routerLink="/favorites"
          routerLinkActive="mobile-active"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          Favoritos
        </a>

        <a
          routerLink="/jobs"
          class="mt-2 flex items-center justify-center bg-[#141414] text-white px-5 py-4 rounded-full text-sm font-medium"
          (click)="isMenuOpen = false"
        >
          Explorar vacantes →
        </a>

      </div>
    }
  </nav>
</header>
