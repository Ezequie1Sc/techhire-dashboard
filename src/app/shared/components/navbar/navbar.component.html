<header class="fixed top-4 left-0 right-0 z-50 px-4">
  <nav class="max-w-7xl mx-auto">

    <div class="navbar-shell">
      <div class="flex items-center justify-between gap-4">

        <!-- Brand -->
        <a
          routerLink="/"
          class="flex items-center gap-3 min-w-0"
          (click)="isMenuOpen = false"
        >
          <div class="brand-logo">
            <img
              src="/logo2.png"
              alt="Logo Jobly"
              class="w-full h-full object-contain"
            />
          </div>

          <div class="leading-tight min-w-0">
            <p class="text-[#141414] font-semibold tracking-[-0.04em] text-lg">
              Jobly
            </p>

            <p class="hidden sm:block text-[10px] text-[#8a8177] uppercase tracking-[0.22em]">
              Tech Jobs
            </p>
          </div>
        </a>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex items-center gap-1 nav-pill">
          <a
            routerLink="/"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
          >
            Inicio
          </a>

          <a
            routerLink="/jobs"
            routerLinkActive="nav-active"
            class="nav-link"
          >
            Vacantes
          </a>

          <a
            routerLink="/favorites"
            routerLinkActive="nav-active"
            class="nav-link"
          >
            Favoritos
          </a>
        </div>

        <!-- Desktop Action -->
        <div class="hidden md:flex items-center gap-3">
          <span class="text-xs text-[#8a8177] uppercase tracking-[0.18em]">
            Remote Jobs
          </span>

          <a
            routerLink="/jobs"
            class="nav-cta"
          >
            Explorar
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13 7l5 5m0 0l-5 5m5-5H6"
              />
            </svg>
          </a>
        </div>

        <!-- Mobile Button -->
        <button
          type="button"
          (click)="toggleMenu()"
          class="mobile-toggle"
          aria-label="Abrir menú"
        >
          @if (!isMenuOpen) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 7h16M4 12h16M4 17h16"
              />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          }
        </button>

      </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMenuOpen) {
      <div class="mobile-menu">

        <a
          routerLink="/"
          routerLinkActive="mobile-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          <span>Inicio</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </a>

        <a
          routerLink="/jobs"
          routerLinkActive="mobile-active"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          <span>Vacantes</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </a>

        <a
          routerLink="/favorites"
          routerLinkActive="mobile-active"
          class="mobile-link"
          (click)="isMenuOpen = false"
        >
          <span>Favoritos</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </a>

        <a
          routerLink="/jobs"
          class="mobile-cta"
          (click)="isMenuOpen = false"
        >
          Explorar vacantes
        </a>

      </div>
    }

  </nav>
</header>
